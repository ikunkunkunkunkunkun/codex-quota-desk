name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: codex-quota-desk-windows-unsigned
            archive-name: codex-quota-desk-windows-unsigned.zip
            build-command: npm run tauri -- build
            artifact-path: src-tauri/target/release/bundle/*
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: ${{ matrix.build-command }}
      - name: Archive bundle
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.artifact-path }}" -DestinationPath "${{ matrix.archive-name }}" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.archive-name }}
          if-no-files-found: error
          retention-days: 90
      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          }
          gh release upload "${{ github.ref_name }}" "${{ matrix.archive-name }}" --clobber
